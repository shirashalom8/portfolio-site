    <style>
          *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
          :root {
                  --bg: #0d0d0d; --bg-card: #141414; --text: #f5f5f5; --text-muted: #8c8c8c;
                  --text-dim: #555; --primary: #ff1a8c; --primary-faint: rgba(255,26,140,0.08);
                  --border: rgba(255,255,255,0.07); --tag-bg: rgba(255,255,255,0.06); --tag-text: #e6e6e6;
          }
          html { scroll-behavior: smooth; }
          body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.6; overflow-x: hidden; }

          .nav-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; letter-spacing: 0.05em; color: var(--text); text-decoration: none; }
          .nav-logo span { color: var(--primary); }
          .nav-links { display: flex; gap: 32px; list-style: none; }
          .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
          .nav-links a:hover { color: var(--text); }
          .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
          .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; }
          #hero { position: relative; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
          .hero-glow-1 { position: absolute; top: 25%; left: -8rem; width: 24rem; height: 24rem; background: var(--primary-faint); border-radius: 50%; filter: blur(80px); pointer-events: none; }
          .hero-glow-2 { position: absolute; bottom: 25%; right: -8rem; width: 20rem; height: 20rem; background: rgba(255,26,140,0.05); border-radius: 50%; filter: blur(80px); pointer-events: none; }
          .hero-inner { position: relative; z-index: 10; max-width: 900px; margin: 0 auto; padding: 0 24px; text-align: center; }
          .hero-photo { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; object-position: top; border: 2px solid rgba(255,26,140,0.35); margin: 0 auto 28px; display: block; opacity: 0; animation: fadeUp 0.8s ease forwards 0.1s; }
          .hero-eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: var(--primary); margin-bottom: 28px; opacity: 0; animation: fadeUp 0.8s ease forwards 0.2s; }
          .hero-name { font-family: 'Playfair Display', serif; font-size: clamp(72px,12vw,120px); font-weight: 400; line-height: 1.0; margin-bottom: 32px; opacity: 0; animation: fadeUp 0.9s ease forwards 0.4s; }

          .hero-ctas { display: flex; gap: 16px; justify-content: center; opacity: 0; animation: fadeUp 0.9s ease forwards 0.8s; }
          .btn-outline { display: inline-flex; align-items: center; gap: 8px; padding: 11px 24px; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; font-weight: 500; text-decoration: none; transition: border-color 0.2s, background 0.2s; }
          .btn-outline:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }
          .btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 11px 24px; background: var(--primary); border: 1px solid var(--primary); border-radius: 6px; color: #fff; font-size: 14px; font-weight: 500; text-decoration: none; transition: opacity 0.2s; }
          .btn-primary:hover { opacity: 0.88; }
          section { padding: 128px 24px; }
          .section-card { background: var(--bg-card); }
          .section-inner { max-width: 1000px; margin: 0 auto; }
          .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase; color: var(--primary); margin-bottom: 16px; }
          .section-title { font-family: 'Playfair Display', serif; font-size: clamp(32px,5vw,48px); font-weight: 400; color: var(--text); margin-bottom: 48px; line-height: 1.2; }
          .about-lead { font-size: 18px; color: var(--text-muted); max-width: 660px; line-height: 1.75; margin-bottom: 64px; }
          .about-cards { display: grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap: 20px; }
          .about-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 28px; transition: border-color 0.2s; }
          .about-card:hover { border-color: rgba(255,26,140,0.25); }

          .about-card h3 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
          .about-card p { font-size: 14px; color: var(--text-muted); line-height: 1.65; }
          .exp-list { display: flex; flex-direction: column; }

          .exp-company { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
          .exp-role { font-size: 13px; color: var(--primary); font-weight: 500; margin-bottom: 8px; }
          .exp-dates { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
          .exp-location { font-size: 12px; color: var(--text-dim); }
          .exp-desc { font-size: 13px; color: var(--text-muted); line-height: 1.65; margin-bottom: 16px; font-style: italic; }
          .exp-bullets { list-style: none; display: flex; flex-direction: column; gap: 8px; }
          .exp-bullets li { font-size: 14px; color: var(--text-muted); padding-left: 16px; position: relative; line-height: 1.55; }
          .exp-bullets li::before { content: ''; position: absolute; left: 0; top: 9px; width: 5px; height: 5px; background: var(--primary); border-radius: 50%; }
          .projects-intro { font-size: 16px; color: var(--text-muted); max-width: 560px; margin-bottom: 16px; line-height: 1.7; }
          .projects-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 56px; font-style: italic; }

          .project-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
